<!DOCTYPE html>
<html>
<head>
    <title>Pro Finance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; background-color: #f4f4f9; }
        
        /* THE LEFT SIDEBAR */
        #sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; overflow-y: auto; }
        .company-btn { width: 100%; background: none; border: none; color: white; text-align: left; padding: 15px; font-size: 16px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .company-btn:hover { background-color: #34495e; }
        
        /* THE RIGHT MAIN AREA */
        #main { flex: 1; padding: 40px; overflow-y: auto; }
        .stat-box { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0px 2px 5px rgba(0,0,0,0.1); min-width: 150px; }
        .filter-btn { padding: 10px 20px; margin-right: 10px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        .filter-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Companies</h2>
        <div id="companyList">
            </div>
    </div>

    <div id="main">
        <h1 id="chartTitle">Select a Company</h1>
        
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div class="stat-box">
                <h4 style="margin: 0; color: #666;">52-Week High</h4>
                <h2 id="highText" style="margin: 5px 0 0 0; color: #28a745;">--</h2>
            </div>
            <div class="stat-box">
                <h4 style="margin: 0; color: #666;">52-Week Low</h4>
                <h2 id="lowText" style="margin: 5px 0 0 0; color: #dc3545;">--</h2>
            </div>
        </div>

        <div style="margin-bottom: 20px;">
            <button class="filter-btn" onclick="loadChartData(currentSymbol, 30)">Last 30 Days</button>
            <button class="filter-btn" onclick="loadChartData(currentSymbol, 90)">Last 90 Days</button>
        </div>

        <div style="background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
            <canvas id="myChart" height="100"></canvas>
        </div>
    </div>

    <script>
        let myLineChart; 
        let currentSymbol = "AAPL"; // Remember what company we are looking at

        // 1. Fetch the list of companies for the sidebar
        fetch('http://127.0.0.1:8000/companies')
            .then(res => res.json())
            .then(data => {
                const listDiv = document.getElementById('companyList');
                data.companies.forEach(company => {
                    const btn = document.createElement('button');
                    btn.className = 'company-btn';
                    btn.innerHTML = `<strong>${company.symbol}</strong><br><small>${company.name}</small>`;
                    
                    // When clicked, load this company!
                    btn.onclick = () => {
                        currentSymbol = company.symbol;
                        document.getElementById('chartTitle').innerText = company.name + " (" + company.symbol + ")";
                        loadSummary(company.symbol);
                        loadChartData(company.symbol, 30); // Default to 30 days
                    };
                    listDiv.appendChild(btn);
                });
            });

        // 2. Fetch Highs and Lows
        function loadSummary(symbol) {
            fetch('http://127.0.0.1:8000/summary/' + symbol)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('highText').innerText = "$" + data['52_week_high'];
                    document.getElementById('lowText').innerText = "$" + data['52_week_low'];
                });
        }

        // 3. Fetch Chart Data (Supports 30 or 90 days!)
        function loadChartData(symbol, days) {
            // Notice we added ?days= to the URL!
            fetch(`http://127.0.0.1:8000/data/${symbol}?days=${days}`)
                .then(res => res.json())
                .then(data => {
                    const dates = data.map(row => row['Date']);
                    const prices = data.map(row => row['Close']);

                    if (myLineChart) myLineChart.destroy();

                    const ctx = document.getElementById('myChart').getContext('2d');
                    myLineChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                label: symbol + ` Price (${days} Days)`,
                                data: prices,
                                borderColor: '#007bff',
                                borderWidth: 3,
                                tension: 0.2
                            }]
                        }
                    });
                });
        }

        // Click the first stock automatically when the page loads
        setTimeout(() => { document.querySelector('.company-btn').click(); }, 500);
    </script>

</body>
</html>
